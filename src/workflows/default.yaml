# The bundled default gtd workflow (v3 "pattern machine" — see
# docs/design/pattern-machine-plan.md). Compiled through the exact same
# `compileWorkflowConfig` a user's `.gtdrc` `workflow:` key goes through — no
# privileged code path (src/workflows/default.ts does the compiling).
#
# Every content string below is INLINE (no `./`-relative file references):
# the bundled default ships inside a single-file build
# (`dist/gtd.bundle.mjs`), so its content must already be resolved at BUILD
# time rather than read from disk at RUNTIME — the same reason
# `src/prompts/*.md` are imported through tsdown's `.md`-as-text loader
# instead of read via `fs` at runtime. `default.yaml` itself is imported the
# same way (tsdown/vitest both treat `.yaml` as text — see
# tsdown.config.ts / tests/vitest.rawMd.ts), so this file never needs a
# sibling prompts/ directory to exist on disk once installed.
#
# States, in cycle order — 7 states, no squash:
#   idle (initial, human, message)
#     -> grilling (agent, prompt): a SINGLE turn — reads .gtd/TODO.md's
#     sketch, explores the codebase, and develops it into a concrete
#     implementation plan in that one turn. No Q&A loop: open questions are
#     resolved inline (stated as assumptions) rather than asked, since the
#     human's checkpoint is the review at the end, not a back-and-forth here.
#   grilling -> building (agent, prompt): implements the plan in .gtd/TODO.md
#     directly (no task decomposition, no per-task queue) and deletes
#     .gtd/TODO.md once the work is complete and verified.
#   building -> checking (check, script): runs the test command inline;
#     A/M .gtd/FEEDBACK.md -> fixing (capped, redirects to escalate); D
#     .gtd/FEEDBACK.md (a green run that just cleaned up prior feedback) or C
#     (green, nothing to clean) -> await-review.
#   fixing (agent, prompt) <-> checking
#   escalate (human, message): manual intervention, then back to checking
#   await-review (human, message): the human reviews the cycle's diff
#     directly (e.g. `git diff <startCommit>` or `git log`) — there is no
#     agent-prepared review file. A clean step (C) approves -> idle, an empty
#     `gtd(human): idle` turn that ends the cycle at rest; anything pending (a
#     fresh .gtd/TODO.md, code edits, or both) is feedback -> grilling,
#     re-entering the pipeline with that input.
#
# The cycle ends at human approval, resting back at idle — there is no
# squash state. The cycle's commits stay in history; whether/how to squash
# them (amend, interactive rebase, a PR's squash-merge) is entirely the
# human's business once they're done reviewing — gtd makes no assumption.
# That squash-flavored finale (a `squashing` prompt state + a `done` commit
# state) still exists as an ENGINE capability (see STATES.md §8) and is kept
# as part of the fuller machine at docs/examples/advanced-workflow.md.
#
# A `gtd(<actor>): idle` commit — entering the workflow's own initial state —
# is therefore a PROCESS BOUNDARY (see `computeProcessRun` in src/Edge.ts):
# the next cycle's `retry` counts, `startCommit`, and diffs never reach back
# across an approved cycle's own idle-entering commit.
#
# `grilling` declares `model: smart` — an opaque harness hint (see the
# comment at `grilling` below) for its heavier one-shot planning turn. Every
# other state is unset (harness default).
#
# `vars.testCommand` is this workflow's own declared default for `checking`'s
# script (see it.vars in PatternTemplates.ts) — override it per-repo with a
# top-level `.gtdrc` `vars: { testCommand: ... }` key, or per-invocation with
# a `GTD_VAR_testCommand` environment variable (highest precedence).
#
# A fuller machine — two-phase Q&A planning, an architecture phase, task
# decomposition, a deterministic per-task builder loop, agent-prepared
# review, and the squash finale (`squashing` + `done`) — is preserved as a
# copy-paste `.gtdrc` example at docs/examples/advanced-workflow.md.

vars:
  testCommand: npm test

states:
  idle:
    actor: human
    initial: true
    message: |
      No active gtd cycle.

      To start one: write `.gtd/TODO.md` with a short sketch of what you want
      built — a few sentences is enough — then run `gtd step human`.
    on:
      "* **": grilling

  grilling:
    actor: agent
    # `model` is an opaque harness hint — gtd never interprets this string, it
    # only passes it through to `gtd next --json`/`gtd status --json` so the
    # driving loop can map it onto whatever models its agent harness
    # provides. "smart" here just names the harness-chosen tier for the
    # heavier planning turn; states without a `model` use the harness's
    # default.
    model: smart
    prompt: |
      You are an autonomous coding agent. `.gtd/` holds this workflow's own
      state — never create, edit, or delete anything under `.gtd/` except
      `.gtd/TODO.md`, which this prompt tells you to develop.

      `.gtd/TODO.md` holds a short sketch of what to build. Read it, explore
      the codebase, and develop it into a concrete implementation plan in
      this one turn — there is no follow-up round here, so settle every open
      question yourself: state each assumption inline (e.g. under an
      `## Assumptions` heading) rather than asking. The human's checkpoint is
      the review at the end of the cycle, not a back-and-forth now.

      Leave `.gtd/TODO.md` uncommitted and finish your turn — do not commit,
      and do not run `gtd step agent` yourself; the harness does that.
    on:
      "* **": building

  building:
    actor: agent
    prompt: |
      You are an autonomous coding agent. `.gtd/` holds this workflow's own
      state — never create or edit anything under `.gtd/` except deleting
      `.gtd/TODO.md`, which this prompt tells you to delete once its work is
      complete.

      The plan to implement is: <%~ it.read(".gtd/TODO.md") %>

      Read that plan and implement it in full. Use TDD discipline: one test,
      then the implementation that passes it, then the next — never write
      all the tests first.

      Delete `.gtd/TODO.md` once the work it describes is complete and
      verified. Leave everything else uncommitted and finish your turn.
    on:
      "* **": checking

  checking:
    actor: check
    script: |
      #!/usr/bin/env bash
      # gtd check turn — the driver (`gtd run`) executes this verbatim, then
      # steps the check actor. Mechanics only: run the test suite and record a
      # red run's output as .gtd/FEEDBACK.md. What that output MEANS (another
      # fix round vs escalation) is decided by the workflow's own `on`/`retry`
      # rules at capture time — never here.
      #
      # `it.vars.testCommand` defaults to "npm test" (this workflow's own
      # `vars:` above) — override it with a top-level `.gtdrc`
      # `vars: { testCommand: ... }` key, or a `GTD_VAR_testCommand`
      # environment variable (highest precedence).
      #
      # A green run also removes any `.gtd/FEEDBACK.md` left over from an
      # earlier red run — there is no squash to discard it for us anymore, so
      # the script cleans it up itself before resting the cycle at
      # `await-review`.
      set +e
      mkdir -p .gtd
      <%~ it.vars.testCommand %> > .gtd/.check-output 2>&1
      code=$?
      if [ "$code" -ne 0 ]; then
        if [ -s .gtd/.check-output ]; then
          mv .gtd/.check-output .gtd/FEEDBACK.md
        else
          rm -f .gtd/.check-output
          printf 'npm test failed with exit code %s and produced no output.' "$code" > .gtd/FEEDBACK.md
        fi
      else
        rm -f .gtd/.check-output
        rm -f .gtd/FEEDBACK.md
      fi
    on:
      "A .gtd/FEEDBACK.md": fixing
      "M .gtd/FEEDBACK.md": fixing
      "D .gtd/FEEDBACK.md": await-review
      "C": await-review

  fixing:
    actor: agent
    retry:
      max: 3
      otherwise: escalate
    prompt: |
      You are an autonomous coding agent. `.gtd/` holds this workflow's own
      state — never create, edit, or delete anything under `.gtd/` except
      `.gtd/FEEDBACK.md`, which this prompt tells you to address.

      Read `.gtd/FEEDBACK.md` (the failing test output) and fix the code so
      the suite passes. Keep the change focused — do not refactor unrelated
      code. If the feedback is wrong, empty or delete `.gtd/FEEDBACK.md`
      instead of "fixing" a non-issue; the machine picks the dispute up
      either way.

      Leave everything uncommitted and finish your turn — do not commit.
    on:
      "* **": checking

  escalate:
    actor: human
    message: |
      The agent could not get the check to pass after repeated attempts.
      `.gtd/FEEDBACK.md` holds the last failing output.

      Investigate and fix it yourself (editing code and/or
      `.gtd/FEEDBACK.md`), then run `gtd step human` to try the check again.
    on:
      "* **": checking

  await-review:
    actor: human
    message: |
      The cycle's checks are green. Review its changes directly — e.g.
      `git diff <%= it.startCommit %>` for the full diff, or `git log
      --stat <%= it.startCommit %>..HEAD` for a commit-by-commit view of
      what changed. There is no separate review file to read.

      To approve: leave the tree clean (no pending changes) and run
      `gtd step human` — the cycle ends and the machine rests at `idle`. Its
      commits stay in history for you to squash however you prefer (e.g.
      `git rebase -i <%= it.startCommit %>`, an amend, or your PR's
      squash-merge) or keep as-is — gtd makes no assumption.

      To request changes: write what's wrong as a fresh `.gtd/TODO.md` (code
      edits alone also count), then run `gtd step human`; this sends the
      cycle back through `grilling` with your feedback as the new input.
    on:
      "C": idle
      "* **": grilling
