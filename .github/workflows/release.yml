name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: gh release create "$GITHUB_REF_NAME" dist/gtd.bundle.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
