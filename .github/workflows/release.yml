name: Release

on:
  push:
    branches:
      - main

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Authenticate with npm via OIDC
        run: |
          OIDC_TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" | jq -r .value)
          PKG_NAME=$(node -p "require('./package.json').name")
          ENCODED=$(node -e "process.stdout.write(encodeURIComponent('$PKG_NAME'))")
          NPM_TOKEN=$(curl -sf -X POST \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/$ENCODED" \
            -H "Authorization: Bearer $OIDC_TOKEN" | jq -r .token)
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
